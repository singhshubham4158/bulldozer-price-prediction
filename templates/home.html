<!DOCTYPE html>
<html>
<head>
    <title>Prediction</title>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1d4350, #a43931);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 15px;
        }

        .price {
            font-size: 32px;
            font-weight: 600;
            margin: 10px 0;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: black;
            border-radius: 10px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>💰 Predicted Price</h1>
    <div class="price">₹ {{ prediction }}</div>

    <a href="/">🔁 Try Again</a>
</div>

</body>
</html>
