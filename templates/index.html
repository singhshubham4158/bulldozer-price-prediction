<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bulldozer Price Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        input::placeholder {
            color: #666;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            opacity: 0.6;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>🚜 Bulldozer AI</h1>
    <div class="subtitle">Predict resale price instantly</div>

    <form action="/predict" method="post">

        <div class="form-group">
            <input type="number" name="YearMade" placeholder="Year Made (e.g. 2010)" required>
        </div>

        <div class="form-group">
            <input type="number" name="MachineHoursCurrentMeter" placeholder="Usage Hours" required>
        </div>

        <div class="form-group">
            <input type="number" name="YearSold" placeholder="Year Sold (e.g. 2015)" required>
        </div>

        <div class="form-group">
            <input type="number" name="MonthSold" placeholder="Month Sold (1-12)" required>
        </div>

        <div class="form-group">
            <input type="number" name="DaySold" placeholder="Day Sold (1-31)" required>
        </div>

        <div class="form-group">
            <input type="number" name="SaleElapsed" placeholder="Sale Elapsed (timestamp)" required>
        </div>

        <button type="submit">🚀 Predict Price</button>

    </form>

    <div class="footer">
        ML-powered • Flask Backend
    </div>
</div>

</body>
</html>
